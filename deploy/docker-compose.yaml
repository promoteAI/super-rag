services:
  hindsight-db:
    # Use a PostgreSQL-Image with pgvector extension pre-installed
    # see https://hub.docker.com/r/pgvector/pgvector 
    image: pgvector/pgvector:pg16
    container_name: hindsight-db
    restart: always
    # Expose PostgreSQL port
    # ports:
      # - "5432:5432"
    environment:
      POSTGRES_USER: ${HINDSIGHT_DB_USER:-super_rag_user}
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-super_rag_password}
      POSTGRES_DB: ${HINDSIGHT_DB_NAME:-super_rag_db}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/pg_data:/var/lib/postgresql/16/docker

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight
    restart: unless-stopped
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - HINDSIGHT_API_LLM_API_KEY=${OPENAI_API_KEY-sk-xmodfeodmqedhuxxafvuazjfrqqlnplotxnfnkvmsvtecngw}
      - HINDSIGHT_API_LLM_MODEL=Qwen/Qwen3.5-4B
      - HINDSIGHT_API_LLM_BASE_URL=https://api.siliconflow.cn/v1
      - HINDSIGHT_API_DATABASE_URL=postgresql://${HINDSIGHT_DB_USER:-super_rag_user}:${HINDSIGHT_DB_PASSWORD:-super_rag_password}@hindsight-db:5432/${HINDSIGHT_DB_NAME:-super_rag_db}
    depends_on:
      - hindsight-db
    ports:
      - "8888:8888"
      - "9999:9999"
      
  seekdb:
    image: oceanbase/seekdb:latest
    container_name: seekdb
    restart: always
    environment:
      - ROOT_PASSWORD=${ROOT_PASSWORD:-123456}
      - SEEKDB_DATABASE=${SEEKDB_DATABASE:-super_rag}
    ports:
      - "2881:2881"
      - "2886:2886"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/seekdb:/var/lib/oceanbase

  rustfs:
    container_name: rustfs
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_VOLUMES=/data/rustfs0,/data/rustfs1,/data/rustfs2,/data/rustfs3
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_EXTERNAL_ADDRESS=:9000  # Same as internal since no port mapping
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=minioadmin
      - RUSTFS_SECRET_KEY=minioadmin
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Console port
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/rustfs_data_0:/data/rustfs0
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/rustfs_data_1:/data/rustfs1
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/rustfs_data_2:/data/rustfs2
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/rustfs_data_3:/data/rustfs3
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/logs_data:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://localhost:9000/health && curl -f http://localhost:9001/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${NEO4J_PORT:-7474} || exit 1",
        ]
      interval: 1s
      timeout: 10s
      retries: 10
      start_period: 3s
    ports:
      - "7474:7474" # HTTP
      - "${NEO4J_PORT:-7687}:${NEO4J_PORT:-7687}" # Bolt
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
networks:
  default:
    name: super_rag
